name: Publish Agent Atlas

on:
  push:
    branches:
      - main
    paths:
      - agents/**
      - .github/workflows/agents-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/configure-pages@v6
      - name: Prepare site
        run: |
          mkdir _site
          cp agents/landing-page.html _site/index.html
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
      - name: Publish site
        id: deployment
        uses: actions/deploy-pages@v5
