name: Publish Agent Atlas

on:
  push:
    branches:
      - main
    paths:
      - agents/**
      - games/**
      - .github/workflows/agents-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/configure-pages@v6
      - name: Prepare site
        run: |
          mkdir _site
          cp agents/landing-page.html _site/index.html
          cp -R agents/logos _site/logos
          mkdir -p _site/games
          cp games/index.html _site/games/index.html
          cp games/README.md _site/games/README.md
          grep -oE '\.\./pocs/[^"]+\.(png|jpg|jpeg|gif|mp4|webm)' games/index.html | sort -u | sed 's#^\.\./##' | while read -r f; do
            mkdir -p "_site/$(dirname "$f")"
            cp "$f" "_site/$f"
          done
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
      - name: Publish site
        id: deployment
        uses: actions/deploy-pages@v5
