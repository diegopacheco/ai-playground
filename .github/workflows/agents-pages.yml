name: Publish Agent Atlas

on:
  push:
    branches:
      - main
    paths:
      - agents/**
      - games/**
      - macos-chrome-apps/**
      - mcp/**
      - sec/**
      - .github/workflows/agents-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/configure-pages@v6
      - name: Prepare site
        run: |
          mkdir _site
          cp agents/landing-page.html _site/index.html
          cp -R agents/logos _site/logos
          mkdir -p _site/agents
          cp agents/landing-page.html _site/agents/index.html
          cp -R agents/logos _site/agents/logos
          mkdir -p _site/games
          cp games/index.html _site/games/index.html
          cp games/README.md _site/games/README.md
          cp -R games/blockrails _site/games/blockrails
          cp -R games/angry-bode _site/games/angry-bode
          grep -oE '\.\./pocs/[^"]+\.(png|jpg|jpeg|gif|mp4|webm)' games/index.html | sort -u | sed 's#^\.\./##' | while read -r f; do
            mkdir -p "_site/$(dirname "$f")"
            cp "$f" "_site/$f"
          done
          mkdir -p _site/mcp
          cp mcp/index.html _site/mcp/index.html
          grep -oE '[^"]+\.(png|jpg|jpeg|gif|mp4|webm)' mcp/index.html | sort -u | while read -r f; do
            mkdir -p "_site/mcp/$(dirname "$f")"
            cp "mcp/$f" "_site/mcp/$f"
          done
          mkdir -p _site/sec
          cp sec/index.html _site/sec/index.html
          cp sec/landing-page.html _site/sec/landing-page.html
          mkdir -p _site/agents/logos _site/agents/open-claw
          cp agents/logos/068-smith-scala-security-agent.png _site/agents/logos/
          cp agents/logos/112-agent-skill-leak-detector-with-claude-coidex.png _site/agents/logos/
          cp agents/logos/126-agent-skill-security-threat-analyst-with-claude-codex.png _site/agents/logos/
          cp agents/logos/147-agent-safehouse-macos-sandboxing-toolkit-for-llm-coding-agents.png _site/agents/logos/
          cp agents/logos/160-agent-skill-accessibility-auditor-wcag-with-claude-codex.png _site/agents/logos/
          cp agents/open-claw/sebastian-sec.png _site/agents/open-claw/
          mkdir -p _site/macos-chrome-apps
          mkdir -p _site/pocs/cc-token-bar
          mkdir -p _site/pocs/chrome-ext-render-html-md/assets
          mkdir -p _site/pocs/fable-5-game-stand/printscreens
          mkdir -p _site/pocs/flowprint/assets
          mkdir -p _site/pocs/localhost-radar/assets
          mkdir -p _site/pocs/tv-time-like/docs/screenshots
          cp macos-chrome-apps/index.html _site/macos-chrome-apps/index.html
          cp pocs/cc-token-bar/cc-bar-result.png _site/pocs/cc-token-bar/cc-bar-result.png
          cp pocs/chrome-ext-render-html-md/assets/github-render-logo.svg _site/pocs/chrome-ext-render-html-md/assets/github-render-logo.svg
          cp pocs/fable-5-game-stand/printscreens/stand.png _site/pocs/fable-5-game-stand/printscreens/stand.png
          cp pocs/flowprint/assets/icon-128.png _site/pocs/flowprint/assets/icon-128.png
          cp pocs/localhost-radar/assets/icon-128.png _site/pocs/localhost-radar/assets/icon-128.png
          cp pocs/tv-time-like/docs/screenshots/library.png _site/pocs/tv-time-like/docs/screenshots/library.png
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
      - name: Publish site
        id: deployment
        uses: actions/deploy-pages@v5
