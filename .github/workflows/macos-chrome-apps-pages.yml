name: Publish macOS and Chrome apps page

on:
  push:
    branches:
      - main
    paths:
      - macos-chrome-apps/**
      - pocs/cc-token-bar/cc-bar-result.png
      - pocs/chrome-ext-render-html-md/assets/github-render-logo.svg
      - pocs/fable-5-game-stand/printscreens/stand.png
      - pocs/flowprint/assets/icon-128.png
      - pocs/localhost-radar/assets/icon-128.png
      - pocs/tv-time-like/docs/screenshots/library.png
      - .github/workflows/macos-chrome-apps-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Assemble site
        run: |
          mkdir -p _site/macos-chrome-apps
          mkdir -p _site/pocs/cc-token-bar
          mkdir -p _site/pocs/chrome-ext-render-html-md/assets
          mkdir -p _site/pocs/fable-5-game-stand/printscreens
          mkdir -p _site/pocs/flowprint/assets
          mkdir -p _site/pocs/localhost-radar/assets
          mkdir -p _site/pocs/tv-time-like/docs/screenshots
          cp macos-chrome-apps/index.html _site/macos-chrome-apps/index.html
          cp pocs/cc-token-bar/cc-bar-result.png _site/pocs/cc-token-bar/cc-bar-result.png
          cp pocs/chrome-ext-render-html-md/assets/github-render-logo.svg _site/pocs/chrome-ext-render-html-md/assets/github-render-logo.svg
          cp pocs/fable-5-game-stand/printscreens/stand.png _site/pocs/fable-5-game-stand/printscreens/stand.png
          cp pocs/flowprint/assets/icon-128.png _site/pocs/flowprint/assets/icon-128.png
          cp pocs/localhost-radar/assets/icon-128.png _site/pocs/localhost-radar/assets/icon-128.png
          cp pocs/tv-time-like/docs/screenshots/library.png _site/pocs/tv-time-like/docs/screenshots/library.png
          touch _site/.nojekyll
      - name: Configure Pages
        uses: actions/configure-pages@v6
      - name: Upload site
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site
      - name: Publish site
        id: deployment
        uses: actions/deploy-pages@v5
