<!doctype html>
<html lang="en" class="github-render-open">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GitHub Render</title>
  <link rel="stylesheet" href="content.css">
  <link rel="stylesheet" href="viewer.css">
</head>
<body>
  <section id="github-render-root">
    <header class="github-render-bar">
      <div class="github-render-identity">
        <span class="github-render-mark">GR</span>
        <div>
          <span class="github-render-label" id="type">Rendered file</span>
          <strong id="name">Loading</strong>
        </div>
      </div>
      <div class="github-render-actions">
        <a id="github" href="#">View on GitHub</a>
        <button id="disable" type="button">Disable and view raw</button>
      </div>
    </header>
    <main class="github-render-stage" id="stage">
      <div class="github-render-loading"><span></span><p>Typesetting document</p></div>
    </main>
  </section>
  <script src="renderer.js"></script>
  <script src="viewer.js"></script>
</body>
</html>
