apiVersion: v1
kind: Service
metadata:
  name: {{ include "agent-werewolf.fullname" . }}-backend
  labels:
    {{- include "agent-werewolf.labels" . | nindent 4 }}
    component: backend
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    {{- include "agent-werewolf.selectorLabels" . | nindent 4 }}
    component: backend
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.service.port }}
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agent-werewolf.fullname" . }}-frontend
  labels:
    {{- include "agent-werewolf.labels" . | nindent 4 }}
    component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  selector:
    {{- include "agent-werewolf.selectorLabels" . | nindent 4 }}
    component: frontend
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: {{ .Values.frontend.service.port }}
      protocol: TCP
