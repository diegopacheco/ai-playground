apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent-werewolf-backend
  namespace: agent-werewolf
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agent-werewolf-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent-werewolf-frontend
  namespace: agent-werewolf
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agent-werewolf-frontend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
