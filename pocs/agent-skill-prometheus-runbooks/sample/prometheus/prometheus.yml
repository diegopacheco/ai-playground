global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alert.rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: sample-app
    static_configs:
      - targets: ['app:8000']

  - job_name: missing-service
    static_configs:
      - targets: ['app:9999']
