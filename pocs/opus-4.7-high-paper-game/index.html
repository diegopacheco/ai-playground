<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Rock Paper Scissors</title>
<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
  }
  .app {
    background: rgba(0,0,0,0.25);
    padding: 40px 50px;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    text-align: center;
    width: 480px;
  }
  h1 { margin: 0 0 20px; font-size: 28px; letter-spacing: 1px; }
  .scoreboard {
    display: flex;
    justify-content: space-around;
    margin-bottom: 24px;
    font-size: 16px;
  }
  .score { background: rgba(255,255,255,0.15); padding: 10px 18px; border-radius: 8px; }
  .choices { display: flex; justify-content: center; gap: 16px; margin: 20px 0; }
  .choice-btn {
    font-size: 48px;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    width: 90px;
    height: 90px;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s;
  }
  .choice-btn:hover { transform: scale(1.1); background: rgba(255,255,255,0.3); }
  .battle { display: flex; justify-content: space-around; align-items: center; margin: 20px 0; min-height: 90px; }
  .player-side { display: flex; flex-direction: column; align-items: center; }
  .player-emoji { font-size: 56px; }
  .player-label { font-size: 13px; opacity: 0.8; margin-top: 6px; }
  .vs { font-size: 22px; font-weight: bold; }
  .result {
    font-size: 22px;
    font-weight: bold;
    margin: 16px 0;
    min-height: 30px;
  }
  .result.win { color: #6effa6; }
  .result.lose { color: #ff6e6e; }
  .result.draw { color: #ffd86e; }
  .reset {
    margin-top: 12px;
    background: rgba(255,255,255,0.2);
    color: #fff;
    border: none;
    padding: 8px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
  }
  .reset:hover { background: rgba(255,255,255,0.35); }
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
  const e = React.createElement;
  const { useState } = React;

  const CHOICES = [
    { name: "rock", emoji: "🪨" },
    { name: "paper", emoji: "📄" },
    { name: "scissors", emoji: "✂️" }
  ];

  const BEATS = { rock: "scissors", paper: "rock", scissors: "paper" };

  function decide(player, computer) {
    if (player === computer) return "draw";
    return BEATS[player] === computer ? "win" : "lose";
  }

  function findChoice(name) {
    return CHOICES.find(c => c.name === name);
  }

  function App() {
    const [playerChoice, setPlayerChoice] = useState(null);
    const [computerChoice, setComputerChoice] = useState(null);
    const [outcome, setOutcome] = useState(null);
    const [wins, setWins] = useState(0);
    const [losses, setLosses] = useState(0);
    const [draws, setDraws] = useState(0);

    function play(choice) {
      const comp = CHOICES[Math.floor(Math.random() * CHOICES.length)];
      const result = decide(choice.name, comp.name);
      setPlayerChoice(choice);
      setComputerChoice(comp);
      setOutcome(result);
      if (result === "win") setWins(w => w + 1);
      else if (result === "lose") setLosses(l => l + 1);
      else setDraws(d => d + 1);
    }

    function reset() {
      setPlayerChoice(null);
      setComputerChoice(null);
      setOutcome(null);
      setWins(0);
      setLosses(0);
      setDraws(0);
    }

    const resultText = outcome === "win" ? "You win!"
      : outcome === "lose" ? "You lose!"
      : outcome === "draw" ? "Draw!"
      : "Pick your move";

    return e("div", { className: "app" },
      e("h1", null, "Rock · Paper · Scissors"),
      e("div", { className: "scoreboard" },
        e("div", { className: "score" }, "Wins: ", wins),
        e("div", { className: "score" }, "Draws: ", draws),
        e("div", { className: "score" }, "Losses: ", losses)
      ),
      e("div", { className: "battle" },
        e("div", { className: "player-side" },
          e("div", { className: "player-emoji" }, playerChoice ? playerChoice.emoji : "❓"),
          e("div", { className: "player-label" }, "You")
        ),
        e("div", { className: "vs" }, "VS"),
        e("div", { className: "player-side" },
          e("div", { className: "player-emoji" }, computerChoice ? computerChoice.emoji : "❓"),
          e("div", { className: "player-label" }, "Computer")
        )
      ),
      e("div", { className: "result " + (outcome || "") }, resultText),
      e("div", { className: "choices" },
        CHOICES.map(c =>
          e("button", {
            key: c.name,
            className: "choice-btn",
            onClick: () => play(c),
            title: c.name
          }, c.emoji)
        )
      ),
      e("button", { className: "reset", onClick: reset }, "Reset")
    );
  }

  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(e(App));
</script>
</body>
</html>
