<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="./_card.css">
</head><body>
<div class="card-root">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px 24px;font-size:20px">
    <div><span style="font-weight:400">Regular 400</span><div style="font-size:11px;color:var(--dp-muted);letter-spacing:.08em;text-transform:uppercase;margin-top:2px">Body, descriptions</div></div>
    <div><span style="font-weight:500">Medium 500</span><div style="font-size:11px;color:var(--dp-muted);letter-spacing:.08em;text-transform:uppercase;margin-top:2px">Links, buttons</div></div>
    <div><span style="font-weight:600">Semibold 600</span><div style="font-size:11px;color:var(--dp-muted);letter-spacing:.08em;text-transform:uppercase;margin-top:2px">Headings, mini-card labels</div></div>
    <div><span style="font-weight:700">Bold 700</span><div style="font-size:11px;color:var(--dp-muted);letter-spacing:.08em;text-transform:uppercase;margin-top:2px">Reserved emphasis</div></div>
  </div>
</div></body></html>
