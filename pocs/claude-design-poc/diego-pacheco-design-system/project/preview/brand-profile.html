<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="./_card.css">
</head><body>
<div class="card-root" style="background:linear-gradient(135deg,#373b44,#4286f4);padding:30px;align-items:center;flex-direction:row;gap:24px">
  <div style="display:inline-flex;align-items:center;justify-content:center;width:140px;height:140px;padding:6px;border-radius:50%;background:rgba(255,255,255,0.2);flex-shrink:0">
    <img src="../assets/image-profile.png" style="width:110px;height:110px;border-radius:50%;object-fit:cover" alt="Diego Pacheco"/>
  </div>
  <div style="color:#fff">
    <div style="font-size:11px;letter-spacing:.3em;text-transform:uppercase;opacity:.8;margin-bottom:6px">Profile photo treatment</div>
    <div style="font-size:24px;font-weight:600">140 px container · 6 px padding · circular</div>
    <div style="font-size:13px;opacity:.85;line-height:1.5;margin-top:6px">Translucent white ring (rgba(255,255,255,0.2)) sits behind a 110 px circular crop of the real photo.</div>
  </div>
</div></body></html>
