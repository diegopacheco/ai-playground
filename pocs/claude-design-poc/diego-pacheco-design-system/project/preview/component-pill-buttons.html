<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="./_card.css">
</head><body>
<div class="card-root" style="background:linear-gradient(135deg,#373b44,#4286f4);padding:30px;color:#fff">
  <div style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;opacity:.7;font-weight:600">Pill buttons — only on hero</div>
  <div class="card-row" style="gap:14px">
    <button style="background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);color:#fff;padding:6px 14px;border-radius:999px;font-size:14px;font-weight:500;font-family:inherit">Prev</button>
    <button style="background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);color:#fff;padding:6px 14px;border-radius:999px;font-size:14px;font-weight:500;font-family:inherit">Next</button>
    <button style="background:rgba(255,255,255,0.3);border:1px solid rgba(255,255,255,0.4);color:#fff;padding:6px 14px;border-radius:999px;font-size:14px;font-weight:500;font-family:inherit">Hover</button>
  </div>
  <div style="font-size:11px;opacity:.7;line-height:1.5">Translucent white 0.20 → 0.30 on hover. Border 0.40. No press state — default focus only.</div>
</div></body></html>
