<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="./_card.css">
</head><body>
<div class="card-root">
  <div style="height:200px;background:linear-gradient(135deg,#373b44,#4286f4);border-radius:18px;display:flex;align-items:flex-end;padding:18px;color:#fff;font-weight:600;letter-spacing:.06em;text-transform:uppercase;font-size:12px">Signature hero gradient · 135°</div>
  <div class="card-row" style="gap:18px">
    <div style="display:flex;align-items:center;gap:10px"><div style="width:32px;height:32px;background:#373b44;border-radius:8px"></div><div><div style="font-size:13px;font-weight:600">From</div><div style="font-family:ui-monospace,monospace;font-size:11px;color:var(--dp-muted)">#373b44</div></div></div>
    <div style="display:flex;align-items:center;gap:10px"><div style="width:32px;height:32px;background:#4286f4;border-radius:8px"></div><div><div style="font-size:13px;font-weight:600">To</div><div style="font-family:ui-monospace,monospace;font-size:11px;color:var(--dp-muted)">#4286f4</div></div></div>
  </div>
</div></body></html>
