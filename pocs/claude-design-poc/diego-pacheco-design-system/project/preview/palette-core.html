<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="./_card.css">
</head><body>
<div class="card-root">
  <div class="card-row">
    <div style="flex:1;min-width:110px;display:flex;flex-direction:column;gap:6px">
      <div style="height:74px;background:#f5f7fb;border-radius:14px;border:1px solid rgba(15,23,42,0.06)"></div>
      <div style="font-size:13px;font-weight:600">Page</div>
      <div style="font-family:ui-monospace,monospace;font-size:11px;color:var(--dp-muted)">#f5f7fb</div>
      <div style="font-family:ui-monospace,monospace;font-size:10px;color:var(--dp-muted)">--dp-bg</div>
    </div><div style="flex:1;min-width:110px;display:flex;flex-direction:column;gap:6px">
      <div style="height:74px;background:#ffffff;border-radius:14px;border:1px solid rgba(15,23,42,0.06)"></div>
      <div style="font-size:13px;font-weight:600">Surface</div>
      <div style="font-family:ui-monospace,monospace;font-size:11px;color:var(--dp-muted)">#ffffff</div>
      <div style="font-family:ui-monospace,monospace;font-size:10px;color:var(--dp-muted)">--dp-card</div>
    </div><div style="flex:1;min-width:110px;display:flex;flex-direction:column;gap:6px">
      <div style="height:74px;background:#1a1f2b;border-radius:14px;border:1px solid rgba(15,23,42,0.06)"></div>
      <div style="font-size:13px;font-weight:600">Text</div>
      <div style="font-family:ui-monospace,monospace;font-size:11px;color:var(--dp-muted)">#1a1f2b</div>
      <div style="font-family:ui-monospace,monospace;font-size:10px;color:var(--dp-muted)">--dp-text</div>
    </div><div style="flex:1;min-width:110px;display:flex;flex-direction:column;gap:6px">
      <div style="height:74px;background:#5f6b81;border-radius:14px;border:1px solid rgba(15,23,42,0.06)"></div>
      <div style="font-size:13px;font-weight:600">Muted</div>
      <div style="font-family:ui-monospace,monospace;font-size:11px;color:var(--dp-muted)">#5f6b81</div>
      <div style="font-family:ui-monospace,monospace;font-size:10px;color:var(--dp-muted)">--dp-muted</div>
    </div><div style="flex:1;min-width:110px;display:flex;flex-direction:column;gap:6px">
      <div style="height:74px;background:#5a67d8;border-radius:14px;border:1px solid rgba(15,23,42,0.06)"></div>
      <div style="font-size:13px;font-weight:600">Primary</div>
      <div style="font-family:ui-monospace,monospace;font-size:11px;color:var(--dp-muted)">#5a67d8</div>
      <div style="font-family:ui-monospace,monospace;font-size:10px;color:var(--dp-muted)">--dp-primary</div>
    </div>
  </div>
</div></body></html>
