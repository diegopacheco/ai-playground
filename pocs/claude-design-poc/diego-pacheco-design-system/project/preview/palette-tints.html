<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="./_card.css">
</head><body>
<div class="card-root">
  <div class="card-row" style="gap:14px">
    <div style="flex:1;min-width:200px;background:rgba(90,103,216,0.08);border:1px solid rgba(90,103,216,0.2);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:6px">
      <div style="font-size:13px;font-weight:600">Primary tint surface</div>
      <div style="font-family:ui-monospace,monospace;font-size:11px;color:var(--dp-muted);line-height:1.5">bg rgba(90,103,216,0.08)<br>border rgba(90,103,216,0.20)</div>
      <div style="font-size:11px;color:var(--dp-muted);letter-spacing:.06em;text-transform:uppercase;font-weight:600">Used on socials grid</div>
    </div>
    <div style="flex:1;min-width:200px;background:#fff;border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:6px;box-shadow:0 12px 22px rgba(15,23,42,0.15)">
      <div style="font-size:13px;font-weight:600">Lifted on hover</div>
      <div style="font-family:ui-monospace,monospace;font-size:11px;color:var(--dp-muted);line-height:1.5">shadow 0 12px 22px<br>rgba(15,23,42,0.15)</div>
      <div style="font-size:11px;color:var(--dp-muted);letter-spacing:.06em;text-transform:uppercase;font-weight:600">No resting shadow</div>
    </div>
  </div>
</div></body></html>
