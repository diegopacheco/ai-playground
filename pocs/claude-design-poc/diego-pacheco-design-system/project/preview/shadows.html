<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="./_card.css">
</head><body>
<div class="card-root" style="background:#eef1f7">
  <div class="card-row" style="gap:14px">
    <div style="flex:1;min-width:200px;background:#fff;border-radius:14px;padding:14px;box-shadow:0 20px 60px rgba(15,23,42,0.08)">
      <div style="font-size:13px;font-weight:600">Card resting</div>
      <div style="font-family:ui-monospace,monospace;font-size:10px;color:var(--dp-muted);margin-top:4px">0 20px 60px rgba(15,23,42,0.08)</div>
    </div>
    <div style="flex:1;min-width:200px;background:#fff;border-radius:14px;padding:14px;box-shadow:0 8px 24px rgba(15,23,42,0.25)">
      <div style="font-size:13px;font-weight:600">Book card</div>
      <div style="font-family:ui-monospace,monospace;font-size:10px;color:var(--dp-muted);margin-top:4px">0 8px 24px rgba(15,23,42,0.25)</div>
    </div>
  </div>
  <div class="card-row" style="gap:14px">
    <div style="flex:1;min-width:200px;background:linear-gradient(165deg,rgba(22,30,78,0.98),rgba(49,66,145,0.98));color:#fff;border-radius:14px;padding:14px;box-shadow:0 14px 28px rgba(15,23,42,0.45)">
      <div style="font-size:13px;font-weight:600">Stack resting</div>
      <div style="font-family:ui-monospace,monospace;font-size:10px;opacity:.8;margin-top:4px">0 14px 28px rgba(15,23,42,0.45)</div>
    </div>
    <div style="flex:1;min-width:200px;background:linear-gradient(165deg,rgba(22,30,78,0.98),rgba(49,66,145,0.98));color:#fff;border-radius:14px;padding:14px;box-shadow:0 20px 45px rgba(15,23,42,0.6)">
      <div style="font-size:13px;font-weight:600">Stack active</div>
      <div style="font-family:ui-monospace,monospace;font-size:10px;opacity:.8;margin-top:4px">0 20px 45px rgba(15,23,42,0.60)</div>
    </div>
  </div>
</div></body></html>
