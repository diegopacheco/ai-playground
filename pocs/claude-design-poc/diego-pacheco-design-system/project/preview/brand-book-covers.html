<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="./_card.css">
</head><body>
<div class="card-root" style="background:linear-gradient(135deg,#373b44,#4286f4);padding:30px">
  <div style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#fff;opacity:.75;font-weight:600">Published Books · overlapping carousel</div>
  <div style="display:flex;gap:0;padding-left:8px">
    <div style="flex:0 0 130px;border-radius:18px;background:rgba(255,255,255,0.12);box-shadow:0 8px 24px rgba(15,23,42,0.25);padding:6px;position:relative;z-index:10">
      <img src="../assets/book-cover-AOS-2025-AI.png" style="width:100%;height:160px;object-fit:cover;border-radius:12px;border:1px solid rgba(255,255,255,0.35)" alt=""/>
    </div><div style="flex:0 0 130px;border-radius:18px;background:rgba(255,255,255,0.12);box-shadow:0 8px 24px rgba(15,23,42,0.25);padding:6px;margin-left:-76px;position:relative;z-index:9">
      <img src="../assets/book-4-2025-cover.png" style="width:100%;height:160px;object-fit:cover;border-radius:12px;border:1px solid rgba(255,255,255,0.35)" alt=""/>
    </div><div style="flex:0 0 130px;border-radius:18px;background:rgba(255,255,255,0.12);box-shadow:0 8px 24px rgba(15,23,42,0.25);padding:6px;margin-left:-76px;position:relative;z-index:8">
      <img src="../assets/book-cm-2024.png" style="width:100%;height:160px;object-fit:cover;border-radius:12px;border:1px solid rgba(255,255,255,0.35)" alt=""/>
    </div><div style="flex:0 0 130px;border-radius:18px;background:rgba(255,255,255,0.12);box-shadow:0 8px 24px rgba(15,23,42,0.25);padding:6px;margin-left:-76px;position:relative;z-index:7">
      <img src="../assets/book-arch-monoliths-2023.png" style="width:100%;height:160px;object-fit:cover;border-radius:12px;border:1px solid rgba(255,255,255,0.35)" alt=""/>
    </div><div style="flex:0 0 130px;border-radius:18px;background:rgba(255,255,255,0.12);box-shadow:0 8px 24px rgba(15,23,42,0.25);padding:6px;margin-left:-76px;position:relative;z-index:6">
      <img src="../assets/book-cover-scala-2016-2.png" style="width:100%;height:160px;object-fit:cover;border-radius:12px;border:1px solid rgba(255,255,255,0.35)" alt=""/>
    </div>
  </div>
  <div style="font-size:11px;color:#fff;opacity:.7;line-height:1.4">Cards overlap by 112 px (margin-left:-112). On hover: lift -6 px + scale 1.05 + opacity 0.9 → 1.</div>
</div></body></html>
