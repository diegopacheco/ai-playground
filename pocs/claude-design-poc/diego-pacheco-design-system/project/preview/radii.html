<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="./_card.css">
</head><body>
<div class="card-root">
  <div class="card-row" style="gap:10px;align-items:flex-end">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div style="width:74px;height:74px;background:var(--dp-primary);border-radius:10px"></div>
      <div style="font-size:11px;font-weight:600">10px</div>
      <div style="font-size:10px;color:var(--dp-muted);font-family:ui-monospace,monospace">--r-2xs</div>
    </div><div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div style="width:74px;height:74px;background:var(--dp-primary);border-radius:12px"></div>
      <div style="font-size:11px;font-weight:600">12px</div>
      <div style="font-size:10px;color:var(--dp-muted);font-family:ui-monospace,monospace">--r-xs</div>
    </div><div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div style="width:74px;height:74px;background:var(--dp-primary);border-radius:14px"></div>
      <div style="font-size:11px;font-weight:600">14px</div>
      <div style="font-size:10px;color:var(--dp-muted);font-family:ui-monospace,monospace">--r-sm</div>
    </div><div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div style="width:74px;height:74px;background:var(--dp-primary);border-radius:16px"></div>
      <div style="font-size:11px;font-weight:600">16px</div>
      <div style="font-size:10px;color:var(--dp-muted);font-family:ui-monospace,monospace">--r-md</div>
    </div><div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div style="width:74px;height:74px;background:var(--dp-primary);border-radius:18px"></div>
      <div style="font-size:11px;font-weight:600">18px</div>
      <div style="font-size:10px;color:var(--dp-muted);font-family:ui-monospace,monospace">--r-lg</div>
    </div><div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div style="width:74px;height:74px;background:var(--dp-primary);border-radius:24px"></div>
      <div style="font-size:11px;font-weight:600">24px</div>
      <div style="font-size:10px;color:var(--dp-muted);font-family:ui-monospace,monospace">--r-xl</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div style="width:74px;height:74px;background:var(--dp-primary);border-radius:999px"></div>
      <div style="font-size:11px;font-weight:600">pill</div>
      <div style="font-size:10px;color:var(--dp-muted);font-family:ui-monospace,monospace">--r-pill</div>
    </div>
  </div>
  <div style="font-size:12px;color:var(--dp-muted);line-height:1.5">Pattern: <strong>nested elements shrink the radius</strong> by ~4–6 px per layer. Card → inner panel → mini-card → image well = 24 → 18 → 14 → 10.</div>
</div></body></html>
