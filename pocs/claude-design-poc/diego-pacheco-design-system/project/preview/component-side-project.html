<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="./_card.css">
</head><body>
<div class="card-root" style="background:linear-gradient(135deg,#373b44,#4286f4);padding:24px;color:#fff">
  <div style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;opacity:.7;font-weight:600">🥇 Tiny Side Projects · stacked card</div>
  <div style="position:relative;width:220px;height:160px;margin-left:24px">
    <div style="position:absolute;top:20px;left:0;width:100%;min-height:106px;display:flex;flex-direction:column;gap:7px;padding:9px 10px;border-radius:18px;background:linear-gradient(165deg,rgba(22,30,78,0.98),rgba(49,66,145,0.98));box-shadow:0 14px 28px rgba(15,23,42,0.45);border:1px solid rgba(255,255,255,0.3);color:#fff;z-index:28">
      <div style="display:flex;gap:12px;align-items:stretch">
        <span style="flex:0 0 45%;border-radius:16px;background:rgba(10,15,38,0.65);display:flex;align-items:center;justify-content:center;font-size:30px;min-height:74px">📑</span>
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;gap:6px">
          <p style="font-size:14px;font-weight:600;margin:0">Zim</p>
          <p style="margin:0;color:rgba(255,255,255,0.8);font-size:10.5px">Zig 0.13 vim-like</p>
        </div>
      </div>
      <span style="font-size:10px;font-weight:600;letter-spacing:.02em;color:rgba(255,255,255,0.9);text-transform:uppercase;align-self:flex-end">zim ↗</span>
    </div><div style="position:absolute;top:10px;left:0;width:100%;min-height:106px;display:flex;flex-direction:column;gap:7px;padding:9px 10px;border-radius:18px;background:linear-gradient(165deg,rgba(22,30,78,0.98),rgba(49,66,145,0.98));box-shadow:0 14px 28px rgba(15,23,42,0.45);border:1px solid rgba(255,255,255,0.3);color:#fff;z-index:29">
      <div style="display:flex;gap:12px;align-items:stretch">
        <span style="flex:0 0 45%;border-radius:16px;background:rgba(10,15,38,0.65);display:flex;align-items:center;justify-content:center;font-size:30px;min-height:74px">🥫</span>
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;gap:6px">
          <p style="font-size:14px;font-weight:600;margin:0">Jello</p>
          <p style="margin:0;color:rgba(255,255,255,0.8);font-size:10.5px">Vanilla JS Trello</p>
        </div>
      </div>
      <span style="font-size:10px;font-weight:600;letter-spacing:.02em;color:rgba(255,255,255,0.9);text-transform:uppercase;align-self:flex-end">jello ↗</span>
    </div><div style="position:absolute;top:0px;left:0;width:100%;min-height:106px;display:flex;flex-direction:column;gap:7px;padding:9px 10px;border-radius:18px;background:linear-gradient(165deg,rgba(22,30,78,0.98),rgba(49,66,145,0.98));box-shadow:0 14px 28px rgba(15,23,42,0.45);border:1px solid rgba(255,255,255,0.3);color:#fff;z-index:30">
      <div style="display:flex;gap:12px;align-items:stretch">
        <span style="flex:0 0 45%;border-radius:16px;background:rgba(10,15,38,0.65);display:flex;align-items:center;justify-content:center;font-size:30px;min-height:74px">🧝🏾‍♂️</span>
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;gap:6px">
          <p style="font-size:14px;font-weight:600;margin:0">Tupi lang</p>
          <p style="margin:0;color:rgba(255,255,255,0.8);font-size:10.5px">Java 23 PL</p>
        </div>
      </div>
      <span style="font-size:10px;font-weight:600;letter-spacing:.02em;color:rgba(255,255,255,0.9);text-transform:uppercase;align-self:flex-end">tupilang ↗</span>
    </div>
  </div>
  <div style="font-size:11px;opacity:.7;line-height:1.4">Auto-rotates every 3 s. Z-index lifts each card by --stack-index. Hover pauses rotation.</div>
</div></body></html>
