<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&display=swap" rel="stylesheet" />
    <style>
      body { margin: 0; background: #fbfaf7; }
      #diagram { width: 1120px; height: 560px; }
      text { font-family: "Caveat", cursive; }
    </style>
  </head>
  <body>
    <div id="diagram">
      <svg viewBox="0 0 1120 560" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="wobble">
            <feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="2" seed="7" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.4" />
          </filter>
          <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b3b3b" />
          </marker>
        </defs>

        <text x="560" y="58" font-size="46" font-weight="700" fill="#2b2b2b" text-anchor="middle">GitHub Control Panel</text>
        <text x="560" y="92" font-size="26" fill="#7a7a7a" text-anchor="middle">paste repos · sync on demand · read from cache</text>

        <g filter="url(#wobble)">
          <rect x="60" y="170" width="250" height="150" rx="16" fill="#dbeafe" stroke="#5b8def" stroke-width="3" />
          <rect x="435" y="170" width="250" height="150" rx="16" fill="#dcfce7" stroke="#3fb96e" stroke-width="3" />
          <rect x="435" y="380" width="250" height="120" rx="16" fill="#fef3c7" stroke="#e0a83b" stroke-width="3" />
          <rect x="810" y="170" width="250" height="150" rx="16" fill="#ede9fe" stroke="#9b7ef0" stroke-width="3" />

          <path d="M 310 245 L 432 245" stroke="#3b3b3b" stroke-width="3" fill="none" marker-end="url(#arrow)" />
          <path d="M 685 245 L 807 245" stroke="#3b3b3b" stroke-width="3" fill="none" marker-end="url(#arrow)" />
          <path d="M 560 320 L 560 377" stroke="#3b3b3b" stroke-width="3" fill="none" marker-end="url(#arrow)" marker-start="url(#arrow)" />
        </g>

        <text x="185" y="232" font-size="30" font-weight="700" fill="#1e3a8a" text-anchor="middle">React 19 + Vite UI</text>
        <text x="185" y="266" font-size="23" fill="#3b5bb5" text-anchor="middle">TanStack · 6 tabs</text>
        <text x="185" y="296" font-size="23" fill="#3b5bb5" text-anchor="middle">token kept in memory</text>

        <text x="560" y="232" font-size="30" font-weight="700" fill="#166534" text-anchor="middle">Spring Boot 4 API</text>
        <text x="560" y="266" font-size="23" fill="#2f7d4f" text-anchor="middle">Java 25 · Spring Data JDBC</text>
        <text x="560" y="296" font-size="23" fill="#2f7d4f" text-anchor="middle">sync · aggregate · serve</text>

        <text x="560" y="432" font-size="30" font-weight="700" fill="#92400e" text-anchor="middle">MySQL cache</text>
        <text x="560" y="466" font-size="23" fill="#b06d1f" text-anchor="middle">HikariCP · no Hibernate</text>

        <text x="935" y="232" font-size="30" font-weight="700" fill="#5b21b6" text-anchor="middle">GitHub REST API</text>
        <text x="935" y="266" font-size="23" fill="#7c4dd0" text-anchor="middle">PRs · issues</text>
        <text x="935" y="296" font-size="23" fill="#7c4dd0" text-anchor="middle">contributors</text>

        <text x="371" y="232" font-size="22" fill="#555" text-anchor="middle">/api</text>
        <text x="746" y="232" font-size="22" fill="#555" text-anchor="middle">on Sync</text>
        <text x="610" y="354" font-size="22" fill="#555" text-anchor="middle">read / write</text>
      </svg>
    </div>
  </body>
</html>
