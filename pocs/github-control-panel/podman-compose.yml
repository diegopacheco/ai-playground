services:
  mysql:
    image: docker.io/library/mysql:9.7
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ghcp
      MYSQL_USER: ghcp
      MYSQL_PASSWORD: ghcp
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: ghcp
      DB_USER: ghcp
      DB_PASSWORD: ghcp
    ports:
      - "8080:8080"
    depends_on:
      - mysql

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
