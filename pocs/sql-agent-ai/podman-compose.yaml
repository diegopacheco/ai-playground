version: "3.8"
services:
  postgres:
    image: postgres:17
    container_name: sql-agent-postgres
    environment:
      POSTGRES_USER: sqlagent
      POSTGRES_PASSWORD: sqlagent123
      POSTGRES_DB: salesdb
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
