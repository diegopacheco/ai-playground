<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coding Habit Tracker</title>
<style>
  :root {
    --bg: #f6f8fa;
    --card: #ffffff;
    --ink: #1f2328;
    --muted: #656d76;
    --line: #d8dee4;
    --accent: #2da44e;
    --accent-soft: #dafbe1;
    --shadow: 0 1px 3px rgba(31,35,40,.08), 0 8px 24px rgba(31,35,40,.06);
    --g0: #ebedf0; --g1: #9be9a8; --g2: #40c463; --g3: #30a14e; --g4: #216e39;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.5;
  }
  .wrap { max-width: 1040px; margin: 0 auto; padding: 40px 24px 80px; }
  header h1 { font-size: 30px; margin: 0 0 4px; letter-spacing: -.4px; }
  header p { color: var(--muted); margin: 0; font-size: 15px; }
  .cards { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; margin: 28px 0 36px; }
  .stat { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 16px; box-shadow: var(--shadow); }
  .stat .n { font-size: 26px; font-weight: 700; letter-spacing: -.5px; }
  .stat .l { font-size: 12px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: .4px; }
  .panel { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 22px 24px; box-shadow: var(--shadow); margin-bottom: 26px; }
  .panel h2 { font-size: 16px; margin: 0 0 16px; display: flex; align-items: center; gap: 8px; }
  .panel h2 .sub { font-weight: 400; color: var(--muted); font-size: 13px; }
  .grid-scroll { overflow-x: auto; padding-bottom: 6px; }
  .grid { display: grid; grid-auto-flow: column; grid-template-rows: repeat(7, 12px); gap: 3px; }
  .cell { width: 12px; height: 12px; border-radius: 3px; background: var(--g0); }
  .lv1 { background: var(--g1); } .lv2 { background: var(--g2); } .lv3 { background: var(--g3); } .lv4 { background: var(--g4); }
  .months { display: flex; gap: 3px; margin: 0 0 6px 30px; font-size: 11px; color: var(--muted); }
  .gridrow { display: flex; gap: 8px; }
  .wdlabels { display: grid; grid-template-rows: repeat(7, 12px); gap: 3px; font-size: 10px; color: var(--muted); width: 22px; }
  .wdlabels span { line-height: 12px; height: 12px; }
  .legend { display: flex; align-items: center; gap: 6px; justify-content: flex-end; font-size: 12px; color: var(--muted); margin-top: 12px; }
  .legend .cell { width: 11px; height: 11px; }
  .bars { display: flex; flex-direction: column; gap: 9px; }
  .bar { display: grid; grid-template-columns: 130px 1fr 56px; align-items: center; gap: 12px; font-size: 13px; }
  .bar .track { background: var(--bg); border-radius: 6px; height: 18px; overflow: hidden; }
  .bar .fill { height: 100%; background: linear-gradient(90deg, #40c463, #216e39); border-radius: 6px; }
  .bar .val { text-align: right; color: var(--muted); font-variant-numeric: tabular-nums; }
  .two { display: grid; grid-template-columns: 1fr 1fr; gap: 26px; }
  .hours { display: flex; align-items: flex-end; gap: 3px; height: 120px; }
  .hours .h { flex: 1; background: var(--accent-soft); border-radius: 4px 4px 0 0; min-height: 2px; position: relative; }
  .hours .h.peak { background: var(--accent); }
  .hticks { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-top: 6px; }
  .wbars { display: flex; align-items: flex-end; gap: 8px; height: 120px; }
  .wbars .w { flex: 1; background: var(--accent-soft); border-radius: 4px 4px 0 0; min-height: 2px; }
  .wbars .w.peak { background: var(--accent); }
  .wticks { display: flex; gap: 8px; font-size: 10px; color: var(--muted); margin-top: 6px; }
  .wticks span { flex: 1; text-align: center; }
  .insights { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .ins { background: var(--card); border: 1px solid var(--line); border-left: 4px solid var(--accent); border-radius: 10px; padding: 14px 16px; box-shadow: var(--shadow); }
  .ins .t { font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .ins .t .e { font-size: 18px; }
  .ins .x { font-size: 13.5px; color: #424a53; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { background: var(--accent-soft); color: #116329; border: 1px solid #b7ecc4; border-radius: 999px; padding: 4px 12px; font-size: 12.5px; font-weight: 600; }
  footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 30px; }
  .tip { position: fixed; pointer-events: none; background: #1f2328; color: #fff; font-size: 12px; padding: 5px 8px; border-radius: 6px; opacity: 0; transition: opacity .1s; white-space: nowrap; z-index: 9; }
  @media (max-width: 820px) { .cards { grid-template-columns: repeat(3, 1fr); } .two, .insights { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🟩 Coding Habit Tracker</h1>
    <p id="subtitle"></p>
  </header>

  <section class="cards" id="cards"></section>

  <section class="panel">
    <h2>Contribution grid <span class="sub" id="gridsub"></span></h2>
    <div class="grid-scroll">
      <div class="months" id="months"></div>
      <div class="gridrow">
        <div class="wdlabels"><span></span><span>Mon</span><span></span><span>Wed</span><span></span><span>Fri</span><span></span></div>
        <div class="grid" id="grid"></div>
      </div>
    </div>
    <div class="legend">Less
      <span class="cell"></span><span class="cell lv1"></span><span class="cell lv2"></span><span class="cell lv3"></span><span class="cell lv4"></span>
      More
    </div>
  </section>

  <section class="panel">
    <h2>💡 Insights</h2>
    <div class="insights" id="insights"></div>
  </section>

  <section class="panel">
    <h2>🛠️ What you're building</h2>
    <div class="chips" id="themes" style="margin-bottom:18px"></div>
    <div class="bars" id="projects"></div>
  </section>

  <section class="panel">
    <h2>🧰 Tools you reach for</h2>
    <div class="bars" id="tools"></div>
  </section>

  <section class="two">
    <div class="panel">
      <h2>⏰ When you code <span class="sub">by hour</span></h2>
      <div class="hours" id="hours"></div>
      <div class="hticks"><span>12a</span><span>6a</span><span>12p</span><span>6p</span><span>11p</span></div>
    </div>
    <div class="panel">
      <h2>📆 Day of week</h2>
      <div class="wbars" id="weekdays"></div>
      <div class="wticks"><span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span></div>
    </div>
  </section>

  <footer id="footer"></footer>
</div>
<div class="tip" id="tip"></div>

<script>
const data = "__DATA__";
const $ = (id) => document.getElementById(id);
const fmt = (n) => n.toLocaleString();

$('subtitle').textContent = `${fmt(data.totals.events)} agent interactions over ${data.span.days} days. Generated ${new Date(data.generatedAt).toLocaleString()}.`;

const cardDefs = [
  ['Sessions', data.totals.sessions],
  ['Active days', data.totals.activeDays],
  ['Current streak', data.streak.current + 'd'],
  ['Longest streak', data.streak.longest + 'd'],
  ['Tool calls', data.totals.toolCalls],
  ['Projects', data.totals.projects],
];
$('cards').innerHTML = cardDefs.map(([l, n]) => `<div class="stat"><div class="n">${typeof n === 'number' ? fmt(n) : n}</div><div class="l">${l}</div></div>`).join('');

const tip = $('tip');
function showTip(e, text) { tip.textContent = text; tip.style.opacity = 1; tip.style.left = (e.clientX + 12) + 'px'; tip.style.top = (e.clientY - 8) + 'px'; }
function hideTip() { tip.style.opacity = 0; }

(function buildGrid() {
  const counts = data.days;
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const start = new Date(today); start.setDate(start.getDate() - 7 * 52 - today.getDay());
  const vals = Object.values(counts);
  const max = vals.length ? Math.max(...vals) : 0;
  const q = [max * 0.15, max * 0.4, max * 0.7].map((n) => Math.max(1, Math.round(n)));
  const lvl = (c) => c === 0 ? 0 : c <= q[0] ? 1 : c <= q[1] ? 2 : c <= q[2] ? 3 : 4;
  const grid = $('grid');
  const monthRow = $('months');
  let active = 0;
  const pad = (n) => String(n).padStart(2, '0');
  const monthMarks = [];
  let cursor = new Date(start);
  let weeks = 0;
  while (cursor <= today) {
    const colFirst = new Date(cursor);
    for (let d = 0; d < 7; d++) {
      if (cursor > today) break;
      const key = `${cursor.getFullYear()}-${pad(cursor.getMonth() + 1)}-${pad(cursor.getDate())}`;
      const c = counts[key] || 0;
      if (c > 0) active++;
      const cell = document.createElement('div');
      cell.className = 'cell' + (lvl(c) ? ' lv' + lvl(c) : '');
      const nice = cursor.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
      cell.addEventListener('mousemove', (e) => showTip(e, `${c} interaction${c === 1 ? '' : 's'} on ${nice}`));
      cell.addEventListener('mouseleave', hideTip);
      grid.appendChild(cell);
      cursor.setDate(cursor.getDate() + 1);
    }
    monthMarks.push(colFirst.getDate() <= 7 ? colFirst.toLocaleDateString('en-US', { month: 'short' }) : '');
    weeks++;
  }
  monthRow.style.display = 'grid';
  monthRow.style.gridTemplateColumns = `repeat(${weeks}, 15px)`;
  monthRow.innerHTML = monthMarks.map((m) => `<span>${m}</span>`).join('');
  $('gridsub').textContent = `${active} active days in the last year`;
})();

$('insights').innerHTML = data.insights.map((i) => `
  <div class="ins"><div class="t"><span class="e">${i.emoji}</span>${i.title}</div><div class="x">${i.text}</div></div>`).join('');

$('themes').innerHTML = data.themes.map(([t, n]) => `<span class="chip">${t} · ${n}</span>`).join('');

function barChart(el, rows, maxv) {
  const m = maxv || Math.max(...rows.map((r) => r[1]), 1);
  el.innerHTML = rows.map(([label, v]) => `
    <div class="bar"><div title="${label}" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${label}</div>
    <div class="track"><div class="fill" style="width:${Math.max(2, (v / m) * 100)}%"></div></div>
    <div class="val">${fmt(v)}</div></div>`).join('');
}
barChart($('projects'), data.projects.map((p) => [p.name, p.events]));
barChart($('tools'), data.tools);

(function hoursChart() {
  const max = Math.max(...data.hours, 1);
  const peak = data.hours.indexOf(max);
  $('hours').innerHTML = data.hours.map((v, h) => `<div class="h${h === peak ? ' peak' : ''}" style="height:${(v / max) * 100}%" data-h="${h}" data-v="${v}"></div>`).join('');
  [...$('hours').children].forEach((el) => {
    el.addEventListener('mousemove', (e) => showTip(e, `${fmt(+el.dataset.v)} interactions at ${(+el.dataset.h % 12 || 12)}${+el.dataset.h < 12 ? 'am' : 'pm'}`));
    el.addEventListener('mouseleave', hideTip);
  });
})();

(function weekChart() {
  const max = Math.max(...data.weekdays, 1);
  const peak = data.weekdays.indexOf(max);
  $('weekdays').innerHTML = data.weekdays.map((v, i) => `<div class="w${i === peak ? ' peak' : ''}" style="height:${(v / max) * 100}%"></div>`).join('');
})();

$('footer').textContent = `Built from ${fmt(data.totals.sessions)} Claude Code sessions · ${fmt(data.totals.userPrompts)} prompts · ${fmt(data.totals.assistantTurns)} assistant turns.`;
</script>
</body>
</html>
