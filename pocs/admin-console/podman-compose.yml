services:
  metadata-postgres:
    image: postgres:18
    container_name: admin-console-metadata
    environment:
      POSTGRES_DB: admin_console
      POSTGRES_USER: admin_console
      POSTGRES_PASSWORD: admin_console
    ports:
      - "5433:5432"
    volumes:
      - admin-console-metadata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_console -d admin_console"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  admin-console-metadata:
