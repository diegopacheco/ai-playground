<svg xmlns="http://www.w3.org/2000/svg" width="840" height="840" viewBox="0 0 840 840" font-family="Caveat, 'Bradley Hand', 'Noteworthy', cursive">
  <defs>
    <filter id="wobble" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="840" height="840" fill="#fbf7f0"/>
  <text x="420" y="66" font-size="42" fill="#2b2b2b" text-anchor="middle">Claude Window Starter</text>
  <text x="420" y="100" font-size="22" fill="#7a7a7a" text-anchor="middle">keep a 5-hour window always warm</text>

  <g filter="url(#wobble)">
    <rect x="250" y="130" width="340" height="86" rx="16" fill="#ffe3bf" stroke="#333" stroke-width="2.5"/>
    <rect x="250" y="278" width="340" height="86" rx="16" fill="#c3f0c8" stroke="#333" stroke-width="2.5"/>
    <rect x="250" y="426" width="340" height="86" rx="16" fill="#b6dbff" stroke="#333" stroke-width="2.5"/>
    <rect x="230" y="586" width="380" height="110" rx="18" fill="#ffc9c9" stroke="#333" stroke-width="3"/>

    <path d="M420,216 Q414,247 420,278" fill="none" stroke="#333" stroke-width="2.5" marker-end="url(#arrow)"/>
    <path d="M420,364 Q426,395 420,426" fill="none" stroke="#333" stroke-width="2.5" marker-end="url(#arrow)"/>
    <path d="M420,512 Q414,549 420,586" fill="none" stroke="#333" stroke-width="2.5" marker-end="url(#arrow)"/>
    <path d="M610,641 Q720,641 720,400 Q720,173 592,173" fill="none" stroke="#8a5a00" stroke-width="2.5" stroke-dasharray="7 7" marker-end="url(#arrow)"/>
  </g>

  <text x="420" y="168" font-size="27" fill="#2b2b2b" text-anchor="middle">launchd timer</text>
  <text x="420" y="197" font-size="20" fill="#5a5a5a" text-anchor="middle">fires every 4 hours</text>

  <text x="420" y="316" font-size="26" fill="#2b2b2b" text-anchor="middle">claude-window-starter.sh</text>
  <text x="420" y="345" font-size="20" fill="#5a5a5a" text-anchor="middle">runs in the background</text>

  <text x="420" y="464" font-size="27" fill="#2b2b2b" text-anchor="middle">claude -p "hi"</text>
  <text x="420" y="493" font-size="20" fill="#5a5a5a" text-anchor="middle">killed after 4 seconds</text>

  <text x="420" y="628" font-size="30" fill="#7a1f1f" text-anchor="middle">5-hour window OPEN</text>
  <text x="420" y="662" font-size="21" fill="#5a5a5a" text-anchor="middle">quota ready the moment you sit down</text>

  <text x="748" y="405" font-size="20" fill="#8a5a00" text-anchor="middle" transform="rotate(90 748 405)">repeat 24/7</text>
</svg>
