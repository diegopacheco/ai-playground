<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Calculator</title>
</head>
<body>
  <form id="search-form">
    <label for="search">Search</label>
    <input id="search" name="q" type="search">
  </form>
  <main id="calculator" hidden>
    <output aria-label="Result">0</output>
    <button type="button" value="5">5</button>
    <button type="button" value="*" aria-label="multiply">×</button>
    <button type="button" value="=" aria-label="equals">=</button>
  </main>
  <script>
    const calculator = document.querySelector("#calculator");
    const output = document.querySelector("output");
    let expression = "";
    document.querySelector("#search-form").addEventListener("submit", event => {
      event.preventDefault();
      if (event.currentTarget.elements.q.value !== "calculator") return;
      calculator.hidden = false;
      location.hash = "calculator";
    });
    calculator.addEventListener("click", event => {
      const value = event.target.value;
      if (!value) return;
      if (value === "=") {
        const values = expression.split("*").map(Number);
        output.value = String(values[0] * values[1]);
        return;
      }
      expression += value;
    });
  </script>
</body>
</html>
