services:
  ai-postgres:
    build:
      context: .
      dockerfile: Containerfile
    container_name: ai-postgres-db
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aidb
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
