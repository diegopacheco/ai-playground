<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="color-scheme" content="light only">
<title>JIT Catching — Dashboard</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<header>
  <h1>JIT Catching <span class="muted">dashboard</span></h1>
  <p class="sub">Light theme. Loopback only. Tests are ephemeral and never committed.</p>
</header>

<section id="counters" class="counters"></section>

<section class="trend">
  <h2>Trend — catches per run</h2>
  <div id="sparkline"></div>
</section>

<section class="runs">
  <h2>Runs</h2>
  <table id="runs-table">
    <thead>
      <tr>
        <th>Run</th><th>Target</th><th>Workflow</th><th>Diff</th>
        <th>Tests</th><th>Surfaced</th><th>Confirmed</th><th>Dismissed</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</section>

<section class="targets">
  <h2>By language target</h2>
  <div id="targets-cards" class="cards"></div>
</section>

<section class="detail" id="detail" hidden>
  <h2>Catch detail</h2>
  <div id="detail-body"></div>
</section>

<footer>
  <span class="muted">jit-testing-skill</span>
</footer>

<script src="/app.js"></script>
</body>
</html>
