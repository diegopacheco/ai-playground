<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 560" font-family="'Caveat', cursive">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&amp;display=swap');
      text { font-family: 'Caveat', 'Comic Sans MS', cursive; }
      .t  { font-size: 22px; fill: #1f2937; }
      .tb { font-size: 24px; font-weight: 700; fill: #111827; }
      .lbl{ font-size: 18px; fill: #374151; }
      .cap{ font-size: 18px; fill: #6b7280; }
    </style>
    <filter id="wobble" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="3.4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="arrowd" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9333ea"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1120" height="560" fill="#fffdf7"/>

  <g filter="url(#wobble)">
    <rect x="470" y="20" width="180" height="62" rx="14" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2.5"/>

    <rect x="30" y="110" width="280" height="380" rx="18" fill="#eff6ff" stroke="#3b82f6" stroke-width="2.5"/>
    <rect x="55" y="160" width="230" height="74" rx="12" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
    <rect x="55" y="252" width="230" height="74" rx="12" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
    <rect x="55" y="344" width="230" height="128" rx="12" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>

    <rect x="420" y="110" width="280" height="380" rx="18" fill="#f0fdf4" stroke="#22c55e" stroke-width="2.5"/>
    <rect x="445" y="160" width="230" height="72" rx="12" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
    <rect x="445" y="252" width="230" height="86" rx="12" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
    <rect x="445" y="358" width="230" height="72" rx="12" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>

    <rect x="820" y="140" width="270" height="320" rx="18" fill="#fefce8" stroke="#eab308" stroke-width="2.5"/>
    <rect x="845" y="180" width="220" height="70" rx="12" fill="#fef9c3" stroke="#facc15" stroke-width="2"/>
    <rect x="845" y="266" width="220" height="70" rx="12" fill="#fef9c3" stroke="#facc15" stroke-width="2"/>
    <rect x="845" y="352" width="220" height="70" rx="12" fill="#fef9c3" stroke="#facc15" stroke-width="2"/>
  </g>

  <g fill="none" stroke="#334155" stroke-width="2.5">
    <path d="M310,196 C360,196 380,196 418,196" marker-end="url(#arrow)"/>
    <path d="M560,232 L560,250" marker-end="url(#arrow)"/>
    <path d="M560,338 L560,356" marker-end="url(#arrow)"/>
    <path d="M678,394 C760,372 770,320 843,300" marker-end="url(#arrow)"/>
  </g>

  <g fill="none" stroke="#9333ea" stroke-width="2.5">
    <path d="M548,250 L520,84" marker-end="url(#arrowd)"/>
    <path d="M572,84 L600,250" marker-end="url(#arrowd)"/>
  </g>

  <g fill="none" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="7 6">
    <path d="M444,230 C360,250 360,360 286,392" marker-end="url(#arrow)"/>
  </g>

  <g text-anchor="middle">
    <text class="tb" x="560" y="58">OpenAI</text>
    <text class="lbl" x="560" y="76" font-size="16">gpt-5.4-mini</text>

    <text class="tb" x="170" y="138">Browser</text>
    <text class="t"  x="170" y="190">Web Speech API</text>
    <text class="cap" x="170" y="214">speech &#8594; text</text>
    <text class="t"  x="170" y="282">Geolocation</text>
    <text class="cap" x="170" y="306">lat, lon</text>
    <text class="t"  x="170" y="392">Leaflet map</text>
    <text class="cap" x="170" y="416">OSM tiles</text>
    <text class="cap" x="170" y="438">markers + route</text>

    <text class="tb" x="560" y="138">Go backend</text>
    <text class="t"  x="560" y="204">HTTP API</text>
    <text class="cap" x="560" y="224" font-size="16">POST /api/query</text>
    <text class="t"  x="560" y="290">Agent loop</text>
    <text class="cap" x="560" y="312">tool calls, max 6</text>
    <text class="t"  x="560" y="402">Tool executors</text>

    <text class="tb" x="955" y="170">OSM services</text>
    <text class="t"  x="955" y="222">Nominatim</text>
    <text class="t"  x="955" y="308">Overpass</text>
    <text class="t"  x="955" y="394">OSRM</text>
  </g>

  <g text-anchor="middle">
    <text class="lbl" x="364" y="184">text, lat, lon, now</text>
    <text class="lbl" x="772" y="332" fill="#a16207">geocode / search / route</text>
    <text class="lbl" x="612" y="160" fill="#9333ea">tools</text>
    <text class="lbl" x="360" y="322" fill="#ef4444">answer, places, route</text>
  </g>
</svg>
