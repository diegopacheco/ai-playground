apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-bad-port
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: broken-bad-port
  template:
    metadata:
      labels:
        app: broken-bad-port
    spec:
      containers:
        - name: web
          image: nginx:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9999
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9999
            initialDelaySeconds: 10
            periodSeconds: 10
