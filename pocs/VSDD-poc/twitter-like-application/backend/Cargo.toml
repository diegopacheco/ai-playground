[package]
name = "twitter-backend"
version = "1.0.0"
edition = "2024"

[dependencies]
actix-web = "4"
actix-multipart = "0.7"
actix-cors = "0.7"
actix-files = "0.6"
tokio = { version = "1", features = ["full"] }
rusqlite = { version = "0.38", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bcrypt = "0.18.0"
uuid = { version = "1", features = ["v4"] }
futures-util = "0.3"

[dev-dependencies]
actix-rt = "2"
reqwest = { version = "0.13.2", features = ["json", "multipart", "cookies"] }
proptest = "1"
tempfile = "3"
