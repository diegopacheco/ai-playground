<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; background: #fbfbf7; }
  #wrap { width: 1180px; height: 560px; }
  svg { display: block; font-family: "Caveat", cursive; }
  .box { stroke: #1f2937; stroke-width: 2.5; filter: url(#rough); }
  .b-blue { fill: #cfe8ff; }
  .b-green { fill: #d6f5dd; }
  .b-yellow { fill: #fff1c2; }
  .b-pink { fill: #ffd6e7; }
  .b-purple { fill: #e7d9ff; }
  .b-orange { fill: #ffe0c2; }
  .lbl { font-size: 27px; fill: #1f2937; font-weight: 700; text-anchor: middle; }
  .sub { font-size: 20px; fill: #374151; font-weight: 500; text-anchor: middle; }
  .edge { stroke: #1f2937; stroke-width: 2.8; fill: none; stroke-linecap: round; }
  .edgeback { stroke: #2563eb; stroke-width: 2.8; fill: none; stroke-linecap: round; stroke-dasharray: 1 9; }
  .elbl { font-size: 21px; fill: #1f2937; font-weight: 700; text-anchor: middle; }
  .elbl-b { font-size: 21px; fill: #2563eb; font-weight: 700; text-anchor: middle; }
  .title { font-size: 40px; fill: #111827; font-weight: 700; }
</style>
</head>
<body>
<div id="wrap">
<svg width="1180" height="560" viewBox="0 0 1180 560">
  <defs>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="n" />
      <feDisplacementMap in="SourceGraphic" in2="n" scale="3.2" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#1f2937" stroke-width="2.4" />
    </marker>
    <marker id="arrowb" markerWidth="12" markerHeight="12" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#2563eb" stroke-width="2.4" />
    </marker>
  </defs>

  <text x="40" y="58" class="title">Hand Enduro — perception loop</text>

  <rect class="box b-blue" x="40" y="130" width="180" height="92" rx="14" />
  <text x="130" y="170" class="lbl">Webcam</text>
  <text x="130" y="198" class="sub">your hand</text>

  <rect class="box b-green" x="290" y="120" width="210" height="112" rx="14" />
  <text x="395" y="160" class="lbl">Browser</text>
  <text x="395" y="188" class="sub">getUserMedia</text>
  <text x="395" y="212" class="sub">+ canvas grab</text>

  <rect class="box b-yellow" x="575" y="120" width="200" height="112" rx="14" />
  <text x="675" y="160" class="lbl">Python</text>
  <text x="675" y="188" class="sub">OpenCV decode</text>
  <text x="675" y="212" class="sub">cv2.imdecode</text>

  <rect class="box b-pink" x="850" y="120" width="200" height="112" rx="14" />
  <text x="950" y="160" class="lbl">MediaPipe</text>
  <text x="950" y="188" class="sub">Hands</text>
  <text x="950" y="212" class="sub">landmark x</text>

  <rect class="box b-purple" x="850" y="330" width="200" height="100" rx="14" />
  <text x="950" y="368" class="lbl">hand x</text>
  <text x="950" y="398" class="sub">to steer 0..1</text>

  <rect class="box b-orange" x="290" y="330" width="280" height="112" rx="14" />
  <text x="430" y="370" class="lbl">Game canvas</text>
  <text x="430" y="398" class="sub">car turns with</text>
  <text x="430" y="422" class="sub">your hand</text>

  <path class="edge" d="M222 176 L286 176" marker-end="url(#arrow)" />

  <path class="edge" d="M502 176 L571 176" marker-end="url(#arrow)" />
  <text x="535" y="150" class="elbl">JPEG</text>
  <text x="537" y="110" class="elbl">WebSocket</text>

  <path class="edge" d="M777 176 L846 176" marker-end="url(#arrow)" />

  <path class="edge" d="M950 234 L950 326" marker-end="url(#arrow)" />

  <path class="edgeback" d="M848 388 Q710 462 574 388" marker-end="url(#arrowb)" />
  <text x="700" y="368" class="elbl-b">steer x  (JSON)</text>
  <text x="700" y="430" class="elbl-b">WebSocket back</text>

  <path class="edgeback" d="M395 326 Q395 280 395 236" marker-end="url(#arrowb)" />
  <text x="300" y="290" class="elbl-b">render</text>
</svg>
</div>
</body>
</html>
