<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; background: #f5fbff; }
  #wrap { width: 1200px; height: 640px; }
  svg { display: block; font-family: "Caveat", cursive; }
  .box { stroke: #143b53; stroke-width: 2.5; filter: url(#rough); }
  .b-blue { fill: #cfe8ff; }
  .b-green { fill: #d6f5dd; }
  .b-yellow { fill: #fff1c2; }
  .b-pink { fill: #ffd6e7; }
  .b-aqua { fill: #cdeffb; }
  .b-orange { fill: #ffe0c2; }
  .lbl { font-size: 27px; fill: #143b53; font-weight: 700; text-anchor: middle; }
  .sub { font-size: 19px; fill: #2f5b72; font-weight: 500; text-anchor: middle; }
  .edge { stroke: #143b53; stroke-width: 2.8; fill: none; stroke-linecap: round; }
  .loop { stroke: #2563eb; stroke-width: 2.8; fill: none; stroke-linecap: round; stroke-dasharray: 1 9; }
  .elbl { font-size: 20px; fill: #143b53; font-weight: 700; text-anchor: middle; }
  .elbl-b { font-size: 20px; fill: #2563eb; font-weight: 700; text-anchor: middle; }
  .title { font-size: 40px; fill: #0e4d6e; font-weight: 700; }
</style>
</head>
<body>
<div id="wrap">
<svg width="1200" height="640" viewBox="0 0 1200 640">
  <defs>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="n" />
      <feDisplacementMap in="SourceGraphic" in2="n" scale="3.2" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#143b53" stroke-width="2.4" />
    </marker>
    <marker id="arrowb" markerWidth="12" markerHeight="12" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#2563eb" stroke-width="2.4" />
    </marker>
  </defs>

  <text x="40" y="56" class="title">Sound Guesser — listen &amp; guess loop</text>

  <rect class="box b-blue" x="40" y="120" width="190" height="96" rx="14" />
  <text x="135" y="158" class="lbl">Microphone</text>
  <text x="135" y="188" class="sub">clap · knock · chicken</text>

  <rect class="box b-green" x="295" y="110" width="210" height="116" rx="14" />
  <text x="400" y="150" class="lbl">Web Audio API</text>
  <text x="400" y="178" class="sub">getUserMedia</text>
  <text x="400" y="202" class="sub">16k mono samples</text>

  <rect class="box b-yellow" x="575" y="110" width="210" height="116" rx="14" />
  <text x="680" y="150" class="lbl">Ring buffer</text>
  <text x="680" y="178" class="sub">~0.975 s window</text>
  <text x="680" y="202" class="sub">rolling, in browser</text>

  <rect class="box b-pink" x="855" y="110" width="215" height="116" rx="14" />
  <text x="962" y="150" class="lbl">MediaPipe</text>
  <text x="962" y="178" class="sub">AudioClassifier</text>
  <text x="962" y="202" class="sub">YAMNet · WASM</text>

  <rect class="box b-aqua" x="855" y="330" width="215" height="120" rx="14" />
  <text x="962" y="372" class="lbl">Top categories</text>
  <text x="962" y="400" class="sub">521 sound classes</text>
  <text x="962" y="424" class="sub">name + score</text>

  <rect class="box b-orange" x="455" y="320" width="320" height="140" rx="14" />
  <text x="615" y="360" class="lbl">Light web UI</text>
  <text x="615" y="388" class="sub">big emoji + label</text>
  <text x="615" y="412" class="sub">confidence meter</text>
  <text x="615" y="436" class="sub">top-4 guess list</text>

  <rect class="box b-green" x="120" y="330" width="240" height="120" rx="14" />
  <text x="240" y="374" class="lbl">You react</text>
  <text x="240" y="402" class="sub">make another sound</text>
  <text x="240" y="426" class="sub">every ~0.28 s</text>

  <path class="edge" d="M232 168 L291 168" marker-end="url(#arrow)" />
  <path class="edge" d="M507 168 L571 168" marker-end="url(#arrow)" />
  <path class="edge" d="M787 168 L851 168" marker-end="url(#arrow)" />
  <text x="540" y="100" class="elbl">Float32 PCM</text>
  <text x="820" y="100" class="elbl">classify()</text>

  <path class="edge" d="M962 228 L962 326" marker-end="url(#arrow)" />
  <path class="loop" d="M853 392 L779 392" marker-end="url(#arrowb)" />
  <text x="815" y="372" class="elbl-b">results</text>

  <path class="loop" d="M453 410 Q400 410 360 400" marker-end="url(#arrowb)" />
  <path class="loop" d="M238 328 Q180 250 200 218" marker-end="url(#arrowb)" />
  <text x="250" y="280" class="elbl-b">listen again</text>
</svg>
</div>
</body>
</html>
