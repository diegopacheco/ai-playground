<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; background: #fbfbf7; }
  #wrap { width: 1200px; height: 720px; }
  svg { display: block; font-family: "Caveat", cursive; }
  .box { stroke: #1f2937; stroke-width: 2.5; filter: url(#rough); }
  .b-blue { fill: #cfe8ff; }
  .b-green { fill: #d6f5dd; }
  .b-yellow { fill: #fff1c2; }
  .b-pink { fill: #ffd6e7; }
  .b-purple { fill: #e7d9ff; }
  .b-orange { fill: #ffe0c2; }
  .b-grey { fill: #ececec; }
  .lbl { font-size: 27px; fill: #1f2937; font-weight: 700; text-anchor: middle; }
  .sub { font-size: 20px; fill: #374151; font-weight: 500; text-anchor: middle; }
  .edge { stroke: #1f2937; stroke-width: 2.8; fill: none; stroke-linecap: round; }
  .edgeback { stroke: #2563eb; stroke-width: 2.8; fill: none; stroke-linecap: round; stroke-dasharray: 1 9; }
  .edgeslow { stroke: #9333ea; stroke-width: 2.6; fill: none; stroke-linecap: round; stroke-dasharray: 7 7; }
  .elbl { font-size: 21px; fill: #1f2937; font-weight: 700; text-anchor: middle; }
  .elbl-b { font-size: 21px; fill: #2563eb; font-weight: 700; text-anchor: middle; }
  .elbl-p { font-size: 20px; fill: #9333ea; font-weight: 700; text-anchor: middle; }
  .title { font-size: 40px; fill: #111827; font-weight: 700; }
</style>
</head>
<body>
<div id="wrap">
<svg width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="11" result="n" />
      <feDisplacementMap in="SourceGraphic" in2="n" scale="3.2" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#1f2937" stroke-width="2.4" />
    </marker>
    <marker id="arrowb" markerWidth="12" markerHeight="12" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#2563eb" stroke-width="2.4" />
    </marker>
    <marker id="arrowp" markerWidth="12" markerHeight="12" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#9333ea" stroke-width="2.4" />
    </marker>
  </defs>

  <text x="40" y="56" class="title">Air Lango — bare-hand boxing loop</text>

  <rect class="box b-blue" x="40" y="120" width="170" height="92" rx="14" />
  <text x="125" y="158" class="lbl">Webcam</text>
  <text x="125" y="186" class="sub">both fists</text>

  <rect class="box b-green" x="280" y="110" width="205" height="112" rx="14" />
  <text x="382" y="150" class="lbl">Browser</text>
  <text x="382" y="178" class="sub">getUserMedia</text>
  <text x="382" y="202" class="sub">+ canvas grab</text>

  <rect class="box b-yellow" x="560" y="110" width="195" height="112" rx="14" />
  <text x="657" y="150" class="lbl">Python</text>
  <text x="657" y="178" class="sub">OpenCV decode</text>
  <text x="657" y="202" class="sub">cv2.imdecode</text>

  <rect class="box b-pink" x="830" y="110" width="200" height="112" rx="14" />
  <text x="930" y="150" class="lbl">MediaPipe</text>
  <text x="930" y="178" class="sub">HandLandmarker · 2</text>
  <text x="930" y="202" class="sub">fist / open / scale</text>

  <rect class="box b-purple" x="830" y="312" width="200" height="120" rx="14" />
  <text x="930" y="352" class="lbl">control packet</text>
  <text x="930" y="380" class="sub">x,y,side,fist,</text>
  <text x="930" y="404" class="sub">open,scale</text>

  <rect class="box b-orange" x="270" y="300" width="320" height="144" rx="14" />
  <text x="430" y="338" class="lbl">Fight canvas · 60 fps</text>
  <text x="430" y="366" class="sub">thrust = punch, palm = block</text>
  <text x="430" y="390" class="sub">life bars · 3 rounds · KO</text>
  <text x="430" y="414" class="sub">L/R side → fighter · CPU AI</text>

  <rect class="box b-green" x="40" y="300" width="190" height="144" rx="14" />
  <text x="135" y="344" class="lbl">Keys</text>
  <text x="135" y="372" class="sub">F G Space</text>
  <text x="135" y="396" class="sub">J K Enter</text>
  <text x="135" y="420" class="sub">fallback</text>

  <rect class="box b-grey" x="430" y="556" width="360" height="120" rx="14" stroke-dasharray="9 7" />
  <text x="610" y="594" class="lbl">LLM watcher · FUTURE</text>
  <text x="610" y="624" class="sub">not built — design-doc only</text>
  <text x="610" y="648" class="sub">would auto-pause / coach off-loop</text>

  <path class="edge" d="M212 166 L276 166" marker-end="url(#arrow)" />

  <path class="edge" d="M487 166 L556 166" marker-end="url(#arrow)" />
  <text x="522" y="140" class="elbl">JPEG</text>
  <text x="524" y="100" class="elbl">WebSocket</text>

  <path class="edge" d="M757 166 L826 166" marker-end="url(#arrow)" />

  <path class="edge" d="M930 224 L930 308" marker-end="url(#arrow)" />

  <path class="edgeback" d="M828 374 Q700 456 592 374" marker-end="url(#arrowb)" />
  <text x="706" y="354" class="elbl-b">{ hands:[…] }  JSON</text>
  <text x="706" y="436" class="elbl-b">WebSocket back · ~16 fps</text>

  <path class="edge" d="M232 372 L266 372" marker-end="url(#arrow)" />

  <path class="edgeslow" d="M470 446 Q500 502 540 553" marker-end="url(#arrowp)" />
  <text x="800" y="606" class="elbl-p">planned, not built —</text>
  <text x="800" y="630" class="elbl-p">off the per-frame path</text>
</svg>
</div>
</body>
</html>
