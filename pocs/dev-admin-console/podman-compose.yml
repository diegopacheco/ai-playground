services:
  metadata-postgres:
    image: postgres:18
    container_name: dev-admin-console-metadata
    environment:
      POSTGRES_DB: dev_admin_console
      POSTGRES_USER: dev_admin_console
      POSTGRES_PASSWORD: dev_admin_console
    ports:
      - "5433:5432"
    volumes:
      - dev-admin-console-metadata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_admin_console -d dev_admin_console"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  dev-admin-console-metadata:
