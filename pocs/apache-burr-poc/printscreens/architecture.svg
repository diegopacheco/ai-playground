<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&amp;display=swap');
      text { font-family: 'Caveat','Bradley Hand','Comic Sans MS',cursive; }
    </style>
    <filter id="wobble" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="3" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
  </defs>

  <rect width="1200" height="1200" fill="#ffffff"/>

  <g transform="translate(0,185)">
    <g filter="url(#wobble)">
      <rect x="460" y="130" width="280" height="78" rx="14" fill="#ffd6e0" stroke="#5a5a5a" stroke-width="2.5"/>
      <rect x="460" y="248" width="280" height="78" rx="14" fill="#d4f0e0" stroke="#5a5a5a" stroke-width="2.5"/>

      <rect x="130" y="375" width="650" height="315" rx="20" fill="#efe7fb" stroke="#7a6ca6" stroke-width="2.5"/>
      <rect x="180" y="455" width="215" height="95" rx="14" fill="#ffe8d6" stroke="#5a5a5a" stroke-width="2.5"/>
      <rect x="470" y="455" width="215" height="95" rx="14" fill="#cfe1ff" stroke="#5a5a5a" stroke-width="2.5"/>

      <rect x="850" y="450" width="300" height="120" rx="14" fill="#d4f5dd" stroke="#5a5a5a" stroke-width="2.5"/>

      <rect x="210" y="745" width="300" height="90" rx="14" fill="#fff3bf" stroke="#5a5a5a" stroke-width="2.5"/>
      <rect x="620" y="745" width="320" height="90" rx="14" fill="#ffd0e0" stroke="#5a5a5a" stroke-width="2.5"/>

      <line x1="600" y1="208" x2="600" y2="244" stroke="#555" stroke-width="3" marker-end="url(#arrow)"/>
      <line x1="600" y1="326" x2="600" y2="370" stroke="#555" stroke-width="3" marker-end="url(#arrow)"/>
      <line x1="395" y1="502" x2="466" y2="502" stroke="#555" stroke-width="3" marker-end="url(#arrow)"/>
      <path d="M577,552 C577,648 287,648 287,552" fill="none" stroke="#555" stroke-width="3" marker-end="url(#arrow)"/>
      <line x1="686" y1="488" x2="848" y2="488" stroke="#555" stroke-width="3" marker-end="url(#arrow)"/>
      <line x1="848" y1="528" x2="686" y2="528" stroke="#555" stroke-width="3" marker-end="url(#arrow)"/>
      <line x1="360" y1="690" x2="360" y2="743" stroke="#555" stroke-width="3" marker-end="url(#arrow)"/>
      <line x1="510" y1="790" x2="616" y2="790" stroke="#555" stroke-width="3" marker-end="url(#arrow)"/>
    </g>

    <g fill="#2b2b2b">
      <text x="600" y="58" text-anchor="middle" font-size="46" font-weight="700">Apache Burr POC</text>
      <text x="600" y="96" text-anchor="middle" font-size="24" fill="#555">an LLM chatbot modeled as a state machine</text>

      <text x="600" y="180" text-anchor="middle" font-size="30">You · terminal</text>
      <text x="600" y="298" text-anchor="middle" font-size="30">chatbot.py</text>
      <text x="664" y="356" font-size="20" fill="#555">app.run()</text>

      <text x="152" y="412" font-size="27" font-weight="700" fill="#4a3f6b">Burr Application · state machine</text>
      <text x="287" y="498" text-anchor="middle" font-size="27">human_input</text>
      <text x="287" y="526" text-anchor="middle" font-size="19" fill="#555">writes prompt</text>
      <text x="577" y="498" text-anchor="middle" font-size="27">ai_response</text>
      <text x="577" y="526" text-anchor="middle" font-size="19" fill="#555">calls OpenAI</text>
      <text x="432" y="668" text-anchor="middle" font-size="21" fill="#555">loop · next turn</text>

      <text x="1000" y="495" text-anchor="middle" font-size="30">OpenAI API</text>
      <text x="1000" y="526" text-anchor="middle" font-size="23" fill="#555">gpt-4o-mini</text>
      <text x="1000" y="552" text-anchor="middle" font-size="18" fill="#777">uses OPENAI_API_KEY</text>
      <text x="767" y="480" text-anchor="middle" font-size="19" fill="#555">messages</text>
      <text x="767" y="548" text-anchor="middle" font-size="19" fill="#555">response</text>

      <text x="372" y="722" font-size="19" fill="#555">every step</text>
      <text x="360" y="786" text-anchor="middle" font-size="28">Local Tracker</text>
      <text x="360" y="815" text-anchor="middle" font-size="20" fill="#555">~/.burr</text>
      <text x="780" y="784" text-anchor="middle" font-size="28">Burr UI</text>
      <text x="780" y="814" text-anchor="middle" font-size="20" fill="#555">localhost:7241</text>
      <text x="563" y="780" text-anchor="middle" font-size="19" fill="#555">reads</text>
    </g>
  </g>
</svg>
